# This workflow will do a clean installation of node dependencies, cache/restore them, 
# build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Testing across the current Long Term Support (LTS) versions
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    # Installs dependencies like express based on your package-lock.json
    - run: npm ci
    
    # This will skip automatically since your package.json lacks a 'build' script
    - run: npm run build --if-present
    
    # This will fail unless you add a 'test' script to your package.json
    - run: npm test
