<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Szkopuł Status</title>
</head>
<body>
<div class="toolbar">
  <button id="color">☀️</button>
  <button id="lang">🇵🇱</button>
</div>

<div id="app">
  <div id="status-badge">
    <span id="status-dot"></span>
    <span id="status">Loading…</span>
  </div>

  <div id="uptime-ring-wrap">
    <svg id="uptime-ring" viewBox="0 0 120 120">
      <circle class="ring-bg" cx="60" cy="60" r="52" />
      <circle class="ring-fg" cx="60" cy="60" r="52"
              stroke-dasharray="326.73" stroke-dashoffset="326.73" />
    </svg>
    <div id="uptime-label">
      <span id="uptime-pct">—</span>
      <span id="uptime-word">uptime</span>
    </div>
  </div>

  <div id="counter">
    <h2 id="days-since">0</h2>
    <h2 id="days-since-text">Dni od ostatniego incydentu</h2>
    <div id="hms">
      <span id="hours"></span>
      <span id="minutes"></span>
      <span id="seconds"></span>
    </div>
  </div>
</div>

<footer>Created by @lcd.101 (back-end) and @blvd1_ (front-end)</footer>

<script src="script.js"></script>
</body>
</html>
