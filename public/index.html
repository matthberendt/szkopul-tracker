<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <title>Szkopuł Status</title>
</head>
<body>
<div class="toolbar">
  <button id="color">☀️</button>
  <button id="lang">🇵🇱</button>
</div>

<div id="app">
  <div id="status-badge">
    <span id="status-dot"></span>
    <span id="status">Loading…</span>
  </div>

  <div id="uptime-label">
    <span id="uptime-pct">—</span>
    <span id="uptime-word">uptime</span>
  </div>

  <div id="counter">
    <h2 id="days-since">0</h2>
    <h2 id="days-since-text">Dni od ostatniego incydentu</h2>
    <div id="hms">
      <span id="hours"></span>
      <span id="minutes"></span>
      <span id="seconds"></span>
    </div>
  </div>
</div>

<div id="chart-section">
  <h3 id="chart-title">Dzienny czas działania</h3>
  <div id="chart-wrap">
    <canvas id="uptime-chart"></canvas>
  </div>
</div>

<footer>Created by @lcd.101 (back-end) and @blvd1_ (front-end)</footer>

<script src="script.js"></script>
</body>
</html>
