<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <title>Szkopuł Status</title>
</head>
<body>

<div id="app">
  <div id="status-badge">
    <span id="status-dot"></span>
    <span id="status">Loading…</span>
  </div>

  <div id="uptime-card">
    <div id="uptime-label">
      <span id="uptime-pct">—</span>
      <span id="uptime-word">uptime</span>
    </div>

    <div id="counter">
      <h2 id="days-since">0</h2>
      <h2 id="days-since-text">Dni od ostatniego incydentu</h2>
      <div id="hms">
        <span id="hours"></span>
        <span id="minutes"></span>
        <span id="seconds"></span>
      </div>
    </div>
  </div>

</div>

<div id="chart-section">
  <h3 id="chart-title">Dzienny czas działania</h3>
  <div id="chart-card">
    <div id="chart-wrap">
      <canvas id="uptime-chart"></canvas>
    </div>
    <div id="chart-legend">
      <span class="legend-item">
        <span class="legend-swatch legend-cf"></span>
        <span id="legend-cf-text">Awaria Cloudflare (wpływ na Szkopuł)</span>
      </span>
    </div>
  </div>
</div>

<div id="ranking-section">
  <h3 id="ranking-title">Najdłuższe okresy bez incydentu</h3>
  <div id="ranking-card">
    <table id="ranking-table">
      <thead>
        <tr>
          <th id="rank-col">#</th>
          <th id="days-col">Dni</th>
          <th id="period-col">Okres</th>
          <th id="status-col">Status</th>
        </tr>
      </thead>
      <tbody id="ranking-body"></tbody>
    </table>
  </div>
</div>

<div id="visitor-counter">
  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
  <span id="visitor-count">0</span>
</div>

<div class="bottom-controls">
  <button id="color" aria-label="Toggle theme">
    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg id="icon-moon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
  <button id="lang" aria-label="Toggle language">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <span id="lang-label">PL</span>
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
